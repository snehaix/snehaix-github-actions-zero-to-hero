name: CICD

on:
  workflow_dispatch:
    inputs:
      environments:
        description: This is environment value
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - production
          - staging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from github"

  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker container build"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test the Docker Container
        run: echo "Testing the container"
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the container
        run:  echo "Docker is running"
        














        
