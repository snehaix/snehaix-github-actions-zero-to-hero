name: Python lint

on: 
  push:
    branches: [main]  

jobs:
  validate:
    runs-on: ubuntu-latest

    steps: 
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Python 3.13
        uses: actions/setup-python@v5

        with:
        cd python-version: "3.13"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run linter
        run: flake8 app.py
        